<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 296 738" fill="none" role="img" aria-label="Architecture pipeline diagram">
  <defs>
    <linearGradient id="d1-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fbfaf8" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="d1-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a96f57"/>
      <stop offset="100%" stop-color="#1a2c45"/>
    </linearGradient>
    <linearGradient id="d1-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2c45" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#a96f57" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a2c45" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="d1-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- vertical connection rail -->
  <path d="M148 90 L148 660" stroke="url(#d1-line)" stroke-width="1.2" stroke-dasharray="2 6"/>

  <!-- node dots on rail -->
  <circle cx="148" cy="120" r="5" fill="#a96f57"/>
  <circle cx="148" cy="120" r="11" fill="none" stroke="#a96f57" stroke-opacity="0.35"/>
  <circle cx="148" cy="278" r="4" fill="#1a2c45"/>
  <circle cx="148" cy="442" r="4" fill="#1a2c45"/>
  <circle cx="148" cy="610" r="5" fill="#a96f57"/>
  <circle cx="148" cy="610" r="11" fill="none" stroke="#a96f57" stroke-opacity="0.35"/>

  <!-- CARD 1: Discover -->
  <g transform="translate(34 60)">
    <rect width="228" height="120" rx="14" fill="url(#d1-card)" stroke="#1a2c45" stroke-opacity="0.18"/>
    <text x="20" y="34" font-family="Chillax, Inter, system-ui, sans-serif" font-size="10" letter-spacing="2" fill="#a96f57">01 / DISCOVER</text>
    <text x="20" y="60" font-family="Chillax, Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#0b0f15">Strategy &amp; scope</text>
    <line x1="20" y1="78" x2="208" y2="78" stroke="#1a2c45" stroke-opacity="0.1"/>
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1a2c45" fill-opacity="0.55">
      <text x="20" y="98">goals · constraints · risk</text>
      <text x="20" y="112">→ value map · architecture</text>
    </g>
  </g>

  <!-- CARD 2: Build -->
  <g transform="translate(34 218)">
    <rect width="228" height="120" rx="14" fill="url(#d1-card)" stroke="#1a2c45" stroke-opacity="0.18"/>
    <text x="20" y="34" font-family="Chillax, Inter, system-ui, sans-serif" font-size="10" letter-spacing="2" fill="#a96f57">02 / BUILD</text>
    <text x="20" y="60" font-family="Chillax, Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#0b0f15">Sprint delivery</text>
    <line x1="20" y1="78" x2="208" y2="78" stroke="#1a2c45" stroke-opacity="0.1"/>
    <!-- mini progress bars -->
    <g transform="translate(20 92)">
      <rect width="188" height="4" rx="2" fill="#1a2c45" fill-opacity="0.08"/>
      <rect width="142" height="4" rx="2" fill="url(#d1-accent)"/>
    </g>
    <g transform="translate(20 106)">
      <rect width="188" height="4" rx="2" fill="#1a2c45" fill-opacity="0.08"/>
      <rect width="98" height="4" rx="2" fill="url(#d1-accent)"/>
    </g>
  </g>

  <!-- CARD 3: Harden -->
  <g transform="translate(34 382)">
    <rect width="228" height="120" rx="14" fill="url(#d1-card)" stroke="#1a2c45" stroke-opacity="0.18"/>
    <text x="20" y="34" font-family="Chillax, Inter, system-ui, sans-serif" font-size="10" letter-spacing="2" fill="#a96f57">03 / HARDEN</text>
    <text x="20" y="60" font-family="Chillax, Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#0b0f15">Security in CI/CD</text>
    <line x1="20" y1="78" x2="208" y2="78" stroke="#1a2c45" stroke-opacity="0.1"/>
    <!-- check rows -->
    <g transform="translate(20 92)" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1a2c45" fill-opacity="0.7">
      <circle cx="4" cy="-3" r="3" fill="#a96f57"/>
      <text x="14" y="0">pen-test · SAST · DAST</text>
      <circle cx="4" cy="11" r="3" fill="#a96f57"/>
      <text x="14" y="14">policies · zero-trust</text>
    </g>
  </g>

  <!-- CARD 4: Ship -->
  <g transform="translate(34 550)">
    <rect width="228" height="120" rx="14" fill="url(#d1-card)" stroke="#1a2c45" stroke-opacity="0.2"/>
    <text x="20" y="34" font-family="Chillax, Inter, system-ui, sans-serif" font-size="10" letter-spacing="2" fill="#a96f57">04 / SHIP</text>
    <text x="20" y="60" font-family="Chillax, Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#0b0f15">Measure · iterate</text>
    <line x1="20" y1="78" x2="208" y2="78" stroke="#1a2c45" stroke-opacity="0.1"/>
    <!-- sparkline -->
    <polyline points="20,108 50,100 78,104 110,92 142,86 174,78 208,70"
              fill="none" stroke="url(#d1-accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="208" cy="70" r="3" fill="#a96f57"/>
  </g>

  <!-- side label -->
  <g transform="translate(8 410) rotate(-90)" font-family="Chillax, Inter, system-ui, sans-serif" font-size="9" letter-spacing="4" fill="#1a2c45" fill-opacity="0.4">
    <text>PIPELINE · MOJFLOW</text>
  </g>
</svg>
