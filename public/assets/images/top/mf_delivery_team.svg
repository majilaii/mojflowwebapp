<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" fill="none" role="img" aria-label="MojFlow delivery team reviewing a dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf8"/>
      <stop offset="55%" stop-color="#fdf1e6"/>
      <stop offset="100%" stop-color="#fce2d4"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="78%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#fce2d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fce2d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1320"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#fce2d4"/>
      <stop offset="100%" stop-color="#e5b299"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce2d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fce2d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a96f57"/>
      <stop offset="100%" stop-color="#1a2c45"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="720" rx="32" fill="url(#bg)"/>
  <rect width="800" height="720" rx="32" fill="url(#bgGlow)"/>

  <!-- soft dot grid (subtle) -->
  <g fill="#1a2c45" fill-opacity="0.05">
    <g id="dotRow"><circle cx="60" cy="60" r="1.6"/><circle cx="120" cy="60" r="1.6"/><circle cx="180" cy="60" r="1.6"/><circle cx="240" cy="60" r="1.6"/><circle cx="300" cy="60" r="1.6"/><circle cx="360" cy="60" r="1.6"/><circle cx="420" cy="60" r="1.6"/><circle cx="480" cy="60" r="1.6"/><circle cx="540" cy="60" r="1.6"/><circle cx="600" cy="60" r="1.6"/><circle cx="660" cy="60" r="1.6"/><circle cx="720" cy="60" r="1.6"/></g>
    <use href="#dotRow" y="60"/><use href="#dotRow" y="120"/><use href="#dotRow" y="180"/>
  </g>

  <!-- floor shadow / horizon -->
  <ellipse cx="400" cy="620" rx="320" ry="22" fill="#1a2c45" fill-opacity="0.07" filter="url(#soft)"/>

  <!-- plant (back left) -->
  <g transform="translate(70 360)">
    <rect x="0" y="158" width="58" height="62" rx="6" fill="#3d4a5d"/>
    <rect x="0" y="158" width="58" height="14" fill="#1a2c45" fill-opacity="0.35"/>
    <path d="M29 158 C20 110 4 80 14 36 C24 60 32 92 32 130" fill="#a96f57" fill-opacity="0.55"/>
    <path d="M29 158 C36 120 52 92 44 50 C36 70 30 100 30 130" fill="#1a2c45" fill-opacity="0.55"/>
    <path d="M29 158 C28 130 26 110 28 88" stroke="#1a2c45" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ===== Whiteboard / Dashboard ===== -->
  <g transform="translate(385 110)">
    <!-- stand -->
    <rect x="155" y="350" width="6" height="120" fill="#3d4a5d"/>
    <rect x="120" y="466" width="76" height="8" rx="4" fill="#3d4a5d"/>

    <!-- screen frame -->
    <rect x="0" y="0" width="320" height="360" rx="16" fill="#1a2c45"/>
    <rect x="8" y="8" width="304" height="344" rx="10" fill="url(#screen)"/>

    <!-- subtle screen glow -->
    <rect x="8" y="8" width="304" height="160" rx="10" fill="url(#screenGlow)"/>

    <!-- top bar -->
    <g transform="translate(20 26)">
      <circle cx="0" cy="0" r="3.2" fill="#ff5f57" fill-opacity="0.75"/>
      <circle cx="12" cy="0" r="3.2" fill="#febc2e" fill-opacity="0.75"/>
      <circle cx="24" cy="0" r="3.2" fill="#28c840" fill-opacity="0.75"/>
      <text x="150" y="3" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff" fill-opacity="0.4">mojflow · delivery board</text>
    </g>
    <line x1="8" y1="44" x2="312" y2="44" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- KPI row -->
    <g transform="translate(24 64)" font-family="Inter, system-ui, sans-serif">
      <g>
        <rect width="84" height="46" rx="8" fill="#ffffff" fill-opacity="0.05"/>
        <text x="10" y="16" font-size="8" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">REVENUE</text>
        <text x="10" y="35" font-size="15" font-weight="600" fill="#fce2d4">+38%</text>
      </g>
      <g transform="translate(96 0)">
        <rect width="84" height="46" rx="8" fill="#ffffff" fill-opacity="0.05"/>
        <text x="10" y="16" font-size="8" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">P95 LATENCY</text>
        <text x="10" y="35" font-size="15" font-weight="600" fill="#ffffff">142ms</text>
      </g>
      <g transform="translate(192 0)">
        <rect width="84" height="46" rx="8" fill="#ffffff" fill-opacity="0.05"/>
        <text x="10" y="16" font-size="8" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">UPTIME</text>
        <text x="10" y="35" font-size="15" font-weight="600" fill="#ffffff">99.99%</text>
      </g>
    </g>

    <!-- chart area -->
    <g transform="translate(24 132)">
      <text font-family="Inter, system-ui, sans-serif" font-size="8" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">WEEKLY DELIVERY</text>
      <!-- grid -->
      <g stroke="#ffffff" stroke-opacity="0.06">
        <line x1="0" y1="34" x2="272" y2="34"/>
        <line x1="0" y1="64" x2="272" y2="64"/>
        <line x1="0" y1="94" x2="272" y2="94"/>
        <line x1="0" y1="124" x2="272" y2="124"/>
      </g>
      <!-- area under line -->
      <path d="M0 120 L34 96 L68 104 L102 80 L136 70 L170 56 L204 44 L238 32 L272 22 L272 124 L0 124 Z"
            fill="url(#chartLine)" fill-opacity="0.18"/>
      <!-- line -->
      <polyline points="0,120 34,96 68,104 102,80 136,70 170,56 204,44 238,32 272,22"
                stroke="url(#chartLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- markers -->
      <g fill="#fce2d4">
        <circle cx="136" cy="70" r="2.4"/>
        <circle cx="272" cy="22" r="3" stroke="#a96f57" stroke-width="1"/>
      </g>
      <!-- x labels -->
      <g font-family="Inter, system-ui, sans-serif" font-size="7" fill="#ffffff" fill-opacity="0.35" text-anchor="middle">
        <text x="0" y="142">W1</text><text x="68" y="142">W2</text><text x="136" y="142">W3</text><text x="204" y="142">W4</text><text x="272" y="142">W5</text>
      </g>
    </g>

    <!-- checklist -->
    <g transform="translate(24 296)" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">
      <g>
        <rect x="-2" y="-7" width="9" height="9" rx="2" fill="#a96f57"/>
        <path d="M-0.5 -2.5 L1.5 -0.5 L5 -4" stroke="#0b0f15" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="14" y="2" fill-opacity="0.85">Plan · scoped</text>
      </g>
      <g transform="translate(96 0)">
        <rect x="-2" y="-7" width="9" height="9" rx="2" fill="#a96f57"/>
        <path d="M-0.5 -2.5 L1.5 -0.5 L5 -4" stroke="#0b0f15" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="14" y="2" fill-opacity="0.85">Build · shipping</text>
      </g>
      <g transform="translate(204 0)">
        <rect x="-2" y="-7" width="9" height="9" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.35"/>
        <text x="14" y="2" fill-opacity="0.6">Harden</text>
      </g>
    </g>

    <!-- footer status bar -->
    <g transform="translate(8 328)">
      <rect width="304" height="24" rx="6" fill="#ffffff" fill-opacity="0.04"/>
      <circle cx="14" cy="12" r="3" fill="#28c840"/>
      <text x="24" y="15" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#ffffff" fill-opacity="0.6">deployed · rev a7f1 · 12 min ago</text>
      <!-- shield icon -->
      <g transform="translate(264 4)">
        <path d="M8 0 L16 3 V8 C16 13 12 16 8 16 C4 16 0 13 0 8 V3 Z" fill="#a96f57" fill-opacity="0.85"/>
        <path d="M4.5 8 L7 10.5 L11.5 6" stroke="#0b0f15" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- ===== People ===== -->

  <!-- Person A: presenter (standing left of board, pointing) -->
  <g transform="translate(280 250)">
    <!-- shadow -->
    <ellipse cx="40" cy="360" rx="62" ry="8" fill="#1a2c45" fill-opacity="0.1"/>
    <!-- legs -->
    <rect x="22" y="232" width="22" height="128" rx="10" fill="#1a2c45"/>
    <rect x="50" y="232" width="22" height="128" rx="10" fill="#0b0f15"/>
    <!-- shoes -->
    <rect x="18" y="352" width="30" height="10" rx="4" fill="#0b0f15"/>
    <rect x="46" y="352" width="30" height="10" rx="4" fill="#0b0f15"/>
    <!-- torso (sweater) -->
    <path d="M14 110 Q14 96 30 92 L62 92 Q80 96 80 110 L80 222 Q80 236 64 238 L30 238 Q14 236 14 222 Z" fill="#a96f57"/>
    <!-- collar v -->
    <path d="M38 92 L48 116 L58 92 Z" fill="#fbfaf8"/>
    <!-- arm raised (pointing at board) -->
    <path d="M76 116 Q120 110 156 90 Q168 86 168 96 Q168 104 158 108 L88 138 Q76 140 76 130 Z" fill="#a96f57"/>
    <!-- pointing hand -->
    <circle cx="166" cy="96" r="8" fill="#f0c3a0"/>
    <!-- other arm (down) -->
    <path d="M16 116 Q4 152 8 218 Q10 230 22 228 Q26 188 30 154 Z" fill="#a96f57"/>
    <circle cx="14" cy="226" r="9" fill="#f0c3a0"/>
    <!-- neck -->
    <rect x="40" y="74" width="16" height="22" fill="#f0c3a0"/>
    <!-- head -->
    <ellipse cx="48" cy="50" rx="28" ry="32" fill="#f0c3a0"/>
    <!-- hair (short, dark) -->
    <path d="M20 42 Q22 16 50 16 Q78 16 78 42 Q78 32 70 28 Q60 22 50 22 Q34 22 26 30 Q22 36 22 44 Z" fill="#1a2c45"/>
    <!-- ear -->
    <ellipse cx="76" cy="52" rx="3" ry="5" fill="#cd9477"/>
  </g>

  <!-- Person B: seated foreground (taking notes on laptop) -->
  <g transform="translate(120 360)">
    <!-- chair -->
    <rect x="-8" y="190" width="116" height="14" rx="6" fill="#3d4a5d"/>
    <rect x="6" y="200" width="6" height="50" fill="#1a2c45"/>
    <rect x="92" y="200" width="6" height="50" fill="#1a2c45"/>
    <!-- legs (seated) -->
    <rect x="20" y="184" width="22" height="68" rx="8" fill="#1a2c45"/>
    <rect x="62" y="184" width="22" height="68" rx="8" fill="#1a2c45"/>
    <!-- torso (blouse) -->
    <path d="M14 86 Q14 70 32 66 L72 66 Q90 70 90 86 L90 190 Q90 202 76 202 L28 202 Q14 202 14 190 Z" fill="#1a2c45"/>
    <!-- collar -->
    <path d="M40 66 L52 90 L64 66 Z" fill="#fbfaf8"/>
    <!-- arms forward (holding laptop) -->
    <path d="M14 110 Q-2 148 14 174 Q22 178 30 170 Q32 144 36 130 Z" fill="#1a2c45"/>
    <path d="M90 110 Q106 148 90 174 Q82 178 74 170 Q72 144 68 130 Z" fill="#1a2c45"/>
    <!-- laptop -->
    <g transform="translate(0 168)">
      <rect x="-6" y="2" width="116" height="14" rx="3" fill="#3d4a5d"/>
      <rect x="-2" y="-32" width="108" height="34" rx="3" fill="#1a2c45"/>
      <rect x="2" y="-28" width="100" height="26" rx="2" fill="#0b0f15"/>
      <!-- screen content -->
      <g transform="translate(6 -24)">
        <rect width="92" height="3" rx="1.5" fill="#fce2d4" fill-opacity="0.6"/>
        <rect y="6" width="70" height="2" rx="1" fill="#ffffff" fill-opacity="0.25"/>
        <rect y="11" width="80" height="2" rx="1" fill="#ffffff" fill-opacity="0.25"/>
        <rect y="16" width="58" height="2" rx="1" fill="#ffffff" fill-opacity="0.25"/>
      </g>
    </g>
    <!-- neck -->
    <rect x="42" y="48" width="16" height="22" fill="#cd9477"/>
    <!-- head -->
    <ellipse cx="50" cy="26" rx="26" ry="30" fill="#cd9477"/>
    <!-- long hair (back) -->
    <path d="M22 28 Q22 -2 50 -2 Q80 -2 80 28 L80 64 Q80 74 70 74 L66 56 Q60 50 50 50 Q40 50 34 56 L30 74 Q22 74 22 64 Z" fill="#3d2418"/>
    <!-- hair front -->
    <path d="M24 22 Q28 6 50 6 Q72 6 76 22 Q70 16 60 16 Q44 16 36 24 Z" fill="#3d2418"/>
  </g>

  <!-- Person C: standing observer (arms crossed, watching) -->
  <g transform="translate(190 290)">
    <!-- shadow -->
    <ellipse cx="42" cy="330" rx="58" ry="7" fill="#1a2c45" fill-opacity="0.08"/>
    <!-- legs -->
    <rect x="22" y="206" width="22" height="118" rx="10" fill="#3d4a5d"/>
    <rect x="50" y="206" width="22" height="118" rx="10" fill="#3d4a5d"/>
    <rect x="18" y="316" width="30" height="10" rx="4" fill="#0b0f15"/>
    <rect x="46" y="316" width="30" height="10" rx="4" fill="#0b0f15"/>
    <!-- torso -->
    <path d="M12 100 Q12 84 30 80 L62 80 Q80 84 80 100 L80 200 Q80 214 64 214 L28 214 Q12 214 12 200 Z" fill="#1a2c45"/>
    <!-- crossed arms -->
    <rect x="6" y="128" width="80" height="22" rx="11" fill="#0e1a2e"/>
    <rect x="12" y="148" width="68" height="20" rx="10" fill="#0e1a2e"/>
    <!-- neck -->
    <rect x="38" y="62" width="16" height="22" fill="#f0c3a0"/>
    <!-- head -->
    <ellipse cx="46" cy="38" rx="26" ry="30" fill="#f0c3a0"/>
    <!-- hair + beard hint -->
    <path d="M20 30 Q20 4 46 4 Q74 4 74 30 Q74 22 66 18 Q56 14 46 14 Q32 14 24 22 Z" fill="#1a2c45"/>
    <path d="M28 58 Q30 70 46 70 Q62 70 64 58 Q60 64 46 64 Q32 64 28 58 Z" fill="#1a2c45" fill-opacity="0.55"/>
  </g>

  <!-- Person D: leaning by board right side -->
  <g transform="translate(700 300)">
    <!-- shadow -->
    <ellipse cx="0" cy="320" rx="52" ry="7" fill="#1a2c45" fill-opacity="0.08"/>
    <!-- legs -->
    <rect x="-22" y="200" width="20" height="116" rx="10" fill="#1a2c45"/>
    <rect x="4" y="200" width="20" height="116" rx="10" fill="#1a2c45"/>
    <rect x="-26" y="308" width="28" height="10" rx="4" fill="#0b0f15"/>
    <rect x="0" y="308" width="28" height="10" rx="4" fill="#0b0f15"/>
    <!-- torso (light sweater) -->
    <path d="M-32 96 Q-32 80 -16 76 L14 76 Q30 80 30 96 L30 200 Q30 212 16 212 L-18 212 Q-32 212 -32 200 Z" fill="#e5b299"/>
    <!-- arm down with coffee -->
    <path d="M-32 116 Q-44 156 -38 200 Q-30 206 -22 200 Q-22 168 -18 138 Z" fill="#e5b299"/>
    <circle cx="-38" cy="202" r="8" fill="#f0c3a0"/>
    <!-- coffee cup -->
    <g transform="translate(-48 200)">
      <rect x="0" y="0" width="18" height="22" rx="2" fill="#fbfaf8" stroke="#1a2c45" stroke-width="1.2"/>
      <path d="M18 6 Q24 6 24 11 Q24 16 18 16" fill="none" stroke="#1a2c45" stroke-width="1.2"/>
      <rect x="2" y="2" width="14" height="4" rx="1" fill="#a96f57"/>
    </g>
    <!-- other arm in pocket -->
    <path d="M30 116 Q42 150 30 188 Q22 192 18 184 Q22 150 22 132 Z" fill="#e5b299"/>
    <!-- neck -->
    <rect x="-8" y="60" width="14" height="20" fill="#cd9477"/>
    <!-- head -->
    <ellipse cx="-1" cy="36" rx="26" ry="30" fill="#cd9477"/>
    <!-- hair (warm brown, side part) -->
    <path d="M-25 28 Q-25 2 -1 2 Q25 2 25 28 Q25 18 18 16 Q4 14 -6 18 Q-18 22 -22 30 Z" fill="#5a3322"/>
    <!-- glasses -->
    <g stroke="#1a2c45" stroke-width="1.4" fill="none">
      <circle cx="-11" cy="38" r="6"/>
      <circle cx="9" cy="38" r="6"/>
      <line x1="-5" y1="38" x2="3" y2="38"/>
    </g>
  </g>

  <!-- ===== floating UI chips ===== -->
  <g transform="translate(95 170)">
    <rect width="160" height="50" rx="10" fill="#ffffff" stroke="#1a2c45" stroke-opacity="0.12"/>
    <circle cx="22" cy="25" r="10" fill="#fce2d4"/>
    <path d="M17 25 L21 29 L28 21" stroke="#a96f57" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="42" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" letter-spacing="1.4" fill="#a96f57">SPRINT 04</text>
    <text x="42" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0b0f15">Shipped on time</text>
  </g>

  <g transform="translate(610 130)">
    <rect width="150" height="58" rx="10" fill="#ffffff" stroke="#1a2c45" stroke-opacity="0.12"/>
    <text x="14" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" letter-spacing="1.4" fill="#a96f57">ROI · 30 DAYS</text>
    <text x="14" y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0b0f15">3.4×</text>
    <!-- mini sparkline -->
    <polyline points="74,46 86,40 98,42 110,34 122,30 134,22"
              stroke="url(#accent)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="134" cy="22" r="2.4" fill="#a96f57"/>
  </g>

  <!-- vertical DELIVERY label -->
  <g transform="translate(40 470) rotate(-90)">
    <text font-family="Chillax, Inter, system-ui, sans-serif" font-size="11" letter-spacing="6" fill="#1a2c45" fill-opacity="0.4">DELIVERY · MOJFLOW</text>
  </g>
</svg>
