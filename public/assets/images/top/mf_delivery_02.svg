<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 294 820" fill="none" role="img" aria-label="Code editor card">
  <defs>
    <linearGradient id="d2-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1320" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0b0f15" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="d2-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a96f57" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#1a2c45" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a96f57" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="d2-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce2d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fce2d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="d2-shadow" x="-30%" y="-10%" width="160%" height="130%">
      <feGaussianBlur stdDeviation="14" in="SourceAlpha"/>
      <feOffset dy="10" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ambient glow behind card -->
  <ellipse cx="147" cy="380" rx="170" ry="200" fill="url(#d2-glow)"/>

  <!-- main glass card -->
  <g filter="url(#d2-shadow)">
    <rect x="18" y="78" width="258" height="664" rx="18" fill="url(#d2-card)" stroke="url(#d2-edge)" stroke-width="1"/>

    <!-- top bar -->
    <line x1="18" y1="116" x2="276" y2="116" stroke="#ffffff" stroke-opacity="0.06"/>
    <circle cx="38" cy="97" r="4" fill="#ff5f57" fill-opacity="0.75"/>
    <circle cx="54" cy="97" r="4" fill="#febc2e" fill-opacity="0.75"/>
    <circle cx="70" cy="97" r="4" fill="#28c840" fill-opacity="0.75"/>
    <text x="147" y="101" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.35">deploy.ts — main</text>

    <!-- file tabs -->
    <g transform="translate(18 116)">
      <rect x="14" y="6" width="84" height="22" rx="6" fill="#ffffff" fill-opacity="0.05"/>
      <text x="56" y="21" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#fce2d4" fill-opacity="0.9">deploy.ts</text>
      <text x="116" y="21" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.35">build.yml</text>
      <text x="178" y="21" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.35">schema.sql</text>
    </g>
    <line x1="18" y1="148" x2="276" y2="148" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- code block -->
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5">
      <!-- line numbers -->
      <g fill="#ffffff" fill-opacity="0.18" text-anchor="end">
        <text x="44" y="178">1</text>
        <text x="44" y="196">2</text>
        <text x="44" y="214">3</text>
        <text x="44" y="232">4</text>
        <text x="44" y="250">5</text>
        <text x="44" y="268">6</text>
        <text x="44" y="286">7</text>
        <text x="44" y="304">8</text>
        <text x="44" y="322">9</text>
        <text x="44" y="340">10</text>
        <text x="44" y="358">11</text>
        <text x="44" y="376">12</text>
        <text x="44" y="394">13</text>
        <text x="44" y="412">14</text>
        <text x="44" y="430">15</text>
        <text x="44" y="448">16</text>
        <text x="44" y="466">17</text>
        <text x="44" y="484">18</text>
      </g>

      <!-- syntax tokens -->
      <g>
        <text x="56" y="178" fill="#7a8aa0">// ship.ts · mojflow</text>

        <text x="56" y="214" fill="#c98a6b">import</text>
        <text x="98" y="214" fill="#d8d8d8"> { pipeline }</text>
        <text x="170" y="214" fill="#c98a6b"> from</text>
        <text x="198" y="214" fill="#a3c9ff">"./core"</text>

        <text x="56" y="250" fill="#c98a6b">export const</text>
        <text x="130" y="250" fill="#e8d4ba"> ship</text>
        <text x="158" y="250" fill="#d8d8d8"> = </text>
        <text x="172" y="250" fill="#c98a6b">async</text>
        <text x="204" y="250" fill="#d8d8d8"> (env) =&gt; {</text>

        <text x="68" y="268" fill="#c98a6b">const</text>
        <text x="100" y="268" fill="#e8d4ba"> result</text>
        <text x="138" y="268" fill="#d8d8d8"> = </text>
        <text x="152" y="268" fill="#c98a6b">await</text>
        <text x="184" y="268" fill="#e8d4ba"> pipeline</text>
        <text x="232" y="268" fill="#d8d8d8">(</text>
        <text x="68" y="286" fill="#d8d8d8">  env,</text>
        <text x="68" y="304" fill="#d8d8d8">  [</text>
        <text x="80" y="322" fill="#a3c9ff">"plan"</text>
        <text x="106" y="322" fill="#d8d8d8">,</text>
        <text x="80" y="340" fill="#a3c9ff">"build"</text>
        <text x="112" y="340" fill="#d8d8d8">,</text>
        <text x="80" y="358" fill="#a3c9ff">"harden"</text>
        <text x="120" y="358" fill="#d8d8d8">,</text>
        <text x="80" y="376" fill="#a3c9ff">"ship"</text>
        <text x="106" y="376" fill="#d8d8d8">,</text>
        <text x="80" y="394" fill="#a3c9ff">"measure"</text>
        <text x="68" y="412" fill="#d8d8d8">  ],</text>

        <text x="68" y="448" fill="#d8d8d8">)</text>

        <text x="68" y="466" fill="#c98a6b">return</text>
        <text x="104" y="466" fill="#e8d4ba"> result</text>
        <text x="56" y="484" fill="#d8d8d8">}</text>
      </g>
    </g>

    <!-- terminal panel -->
    <g transform="translate(18 520)">
      <line x1="0" y1="0" x2="258" y2="0" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="18" y="22" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.35">TERMINAL</text>
      <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10">
        <text x="18" y="46" fill="#a96f57">$</text>
        <text x="28" y="46" fill="#d8d8d8"> mojflow ship --env=prod</text>
        <text x="18" y="64" fill="#7a8aa0">✓ plan         ok 240ms</text>
        <text x="18" y="82" fill="#7a8aa0">✓ build        ok  1.4s</text>
        <text x="18" y="100" fill="#7a8aa0">✓ harden       ok 820ms</text>
        <text x="18" y="118" fill="#7a8aa0">✓ ship         ok  2.1s</text>
        <text x="18" y="136" fill="#fce2d4">▸ deploy live · revision a7f1</text>
        <text x="18" y="160" fill="#a96f57">$</text>
        <rect x="28" y="151" width="6" height="12" fill="#fce2d4" fill-opacity="0.7"/>
      </g>

      <!-- status row -->
      <g transform="translate(0 192)">
        <rect width="258" height="22" rx="6" fill="#ffffff" fill-opacity="0.04"/>
        <circle cx="14" cy="11" r="3" fill="#28c840"/>
        <text x="24" y="15" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.7">healthy</text>
        <text x="86" y="15" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.45">p95 142ms</text>
        <text x="170" y="15" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#ffffff" fill-opacity="0.45">err 0.02%</text>
      </g>
    </g>
  </g>

  <!-- floating tag chip -->
  <g transform="translate(208 56)">
    <rect width="68" height="22" rx="11" fill="#fce2d4"/>
    <text x="34" y="15" text-anchor="middle" font-family="Chillax, Inter, system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="1.5" fill="#1a2c45">DELIVERY</text>
  </g>
</svg>
